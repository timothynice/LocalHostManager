name: Optional Binary Build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish or update a GitHub release when run against a v* tag"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Derive version metadata
        run: |
          VERSION="$(cat VERSION)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=v${VERSION}" >> "$GITHUB_ENV"
          fi

          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          if [[ -z "$APPLE_DEVELOPER_ID_CERT_P12_BASE64" || -z "$APPLE_DEVELOPER_ID_CERT_PASSWORD" ]]; then
            echo "No Developer ID certificate secrets present. Building unsigned artifacts."
            exit 0
          fi

          python3 - <<'PY'
          import base64, os, pathlib
          pathlib.Path("developer-id-cert.p12").write_bytes(
              base64.b64decode(os.environ["APPLE_DEVELOPER_ID_CERT_P12_BASE64"])
          )
          PY

          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security import developer-id-cert.p12 \
            -k build.keychain \
            -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain login.keychain

      - name: Build binary artifacts
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./scripts/package-release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Studi0Ports-${{ env.APP_VERSION }}
          path: |
            dist/*.zip
            dist/*.dmg
            dist/*-sha256.txt

      - name: Publish GitHub release
        if: ${{ inputs.publish_release && startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            && gh release upload "$RELEASE_TAG" dist/*.zip dist/*.dmg dist/*-sha256.txt --clobber \
            || gh release create "$RELEASE_TAG" dist/*.zip dist/*.dmg dist/*-sha256.txt \
              --title "Studi0 Ports $APP_VERSION" \
              --generate-notes
